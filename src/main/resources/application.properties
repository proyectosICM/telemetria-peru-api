# ===== JOB Fuel Theft =====
jobs.fuel-theft.enabled=true
jobs.fuel-theft.active-window-minutes=10
jobs.fuel-theft.batch-size=200
jobs.fuel-theft.zone=America/Lima

# ===== Pipeline Health Job =====
jobs.pipeline-health.enabled=true
jobs.pipeline-health.zone=America/Lima
jobs.pipeline-health.active-window-minutes=60
jobs.pipeline-health.max-acceptable-lag-minutes=15

# ===== Retention Cleanup Job =====
jobs.retention.enabled=true
jobs.retention.zone=America/Lima
jobs.retention.retention-days=90
jobs.retention.batch-size=5000
jobs.retention.max-batches=50
jobs.retention.dry-run=true